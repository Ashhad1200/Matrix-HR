# MatrixHR — full stack from project root (E:\Matrix HR)
#
# RECOMMENDED (kills port conflicts + starts everything):
#   pnpm docker:up
#   .\compose-up.ps1
#   powershell -File scripts\compose-up.ps1
#
# Plain docker compose (no port cleanup — may fail if 3000/3001 in use):
#   docker compose up --build
#
# Stop everything:
#   docker compose down

services:
  postgres:
    image: postgres:16-alpine
    container_name: matrixhr-postgres
    environment:
      POSTGRES_USER: matrixhr
      POSTGRES_PASSWORD: matrixhr
      POSTGRES_DB: matrixhr
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U matrixhr"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: matrixhr-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: matrixhr-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: matrixhr
      MINIO_ROOT_PASSWORD: matrixhrsecret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  api:
    image: node:20-bookworm
    container_name: matrixhr-api
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://matrixhr:matrixhr@postgres:5432/matrixhr?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-secret-change-in-production-32chars
      JWT_REFRESH_SECRET: dev-refresh-secret-change-in-prod
      WEB_URL: http://localhost:3000
      API_URL: http://localhost:3001
      PORT: "3001"
    entrypoint: ["/bin/sh", "/app/docker/entrypoint-api.sh"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: node:20-bookworm
    container_name: matrixhr-web
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      WEB_URL: http://localhost:3000
    entrypoint: ["/bin/sh", "/app/docker/entrypoint-web.sh"]
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  node_modules:
